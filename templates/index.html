<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTB Label Verification</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Alcohol Label Verification</h1>
        <p>OCR-assisted workflow for TTB compliance review acceleration.</p>
      </header>

      <section class="card">
        <h2>Application Info</h2>
        <div class="grid">
          <label class="span-full">Brand Name <input id="brandName" placeholder="OLD TOM DISTILLERY" /></label>

          <div class="class-code-section span-full">
            <label class="class-code-input">Class/Type Code <input id="classTypeCode" placeholder="101" /></label>
            <details class="guided-assist">
              <summary>Optional guided Class/Type Code selection</summary>
              <div class="grid">
                <label>
                  Common keyword
                  <select id="classCodeCategory">
                    <option value="">Loading…</option>
                  </select>
                </label>
                <label>
                  Specific type/code
                  <select id="classCodeType">
                    <option value="">Select keyword first</option>
                  </select>
                </label>
              </div>
            </details>
          </div>

          <label
            >Alcohol Content (%)
            <input id="alcoholContent" type="number" min="0.1" max="100" step="0.1" placeholder="45" />
          </label>
          <label
            >Net Contents
            <div class="inline-fields">
              <input id="netContents" type="number" min="0.1" step="0.1" placeholder="750" />
              <select id="netContentsUnit">
                <option value="mL" selected>mL</option>
                <option value="L">L</option>
                <option value="fl. oz">fl. oz</option>
                <option value="gal">gal</option>
                <option value="pint">pint</option>
              </select>
            </div>
          </label>
          <label class="span-full">Bottler/Producer Name<input id="bottler" placeholder="Bottled by ..." /></label>
          <label class="span-full">Bottler/Producer Address <input id="bottlerAddress" placeholder="123 Main St, Frankfort, KY" /></label>
          <label
            >Country of Origin
            <select id="origin"></select>
          </label>
          <label
            >Age Statement (Years)
            <input id="ageYears" type="number" min="0.1" max="150" step="0.1" placeholder="4" />
            <small id="ageYearsHint" class="note">Required for certain whisky classes (Chapter 8).</small>
          </label>

          <div class="span-full additive-options">
            <strong>Optional additive disclosure checks</strong>
            <label><input id="flagFdcYellow5" type="checkbox" /> FD&C Yellow No. 5</label>
            <label><input id="flagCochinealExtract" type="checkbox" /> Cochineal Extract</label>
            <label><input id="flagCarmine" type="checkbox" /> Carmine</label>
          </div>
        </div>

      </section>

      <section class="card">
        <h2>Label Upload</h2>
        <p class="note">Select one or more images (maximum 50).</p>
        <input id="labelFiles" type="file" accept="image/*" multiple />
        <div class="actions">
          <button id="verifyBtn">Verify Labels</button>
          <span id="status"></span>
        </div>
      </section>

      <section class="card">
        <h2>Results</h2>
        <div id="summary" class="summary"></div>
        <div id="results"></div>
      </section>
    </main>

    <template id="resultTemplate">
      <article class="result-card">
        <h3></h3>
        <p class="confidence"></p>
        <table>
          <thead>
            <tr>
              <th>Field</th>
              <th>Expected</th>
              <th>Detected</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <details>
          <summary>OCR Text</summary>
          <pre></pre>
        </details>
      </article>
    </template>

    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
