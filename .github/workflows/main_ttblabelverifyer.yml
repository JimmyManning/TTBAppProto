name: Build and deploy container to Azure Web App - ttblabelverifyer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_393A544A81EC40399C46C84245657BAF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F205CD6376B945618A52C395EE12A910 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5C18393017824C0994DC52BD46394808 }}

      - name: Build and push image to ACR
        env:
          ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}
          ACR_RESOURCE_GROUP: ${{ secrets.AZURE_ACR_RESOURCE_GROUP }}
          WEBAPP_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          IMAGE_NAME: ttblabelverifyer
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [[ -z "${ACR_NAME:-}" ]]; then
            echo "AZURE_ACR_NAME secret is missing"
            exit 1
          fi

          RG="${ACR_RESOURCE_GROUP:-$WEBAPP_RESOURCE_GROUP}"
          if [[ -z "${RG:-}" ]]; then
            echo "Set AZURE_ACR_RESOURCE_GROUP or AZURE_RESOURCE_GROUP"
            exit 1
          fi

          ACR_LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --resource-group "$RG" --query loginServer -o tsv)
          ACR_TOKEN=$(az acr login --name "$ACR_NAME" --expose-token --output tsv --query accessToken)
          docker login "$ACR_LOGIN_SERVER" --username 00000000-0000-0000-0000-000000000000 --password "$ACR_TOKEN"

          docker build -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG" .
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG"

      - name: Configure Web App to use image
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          ACR_RESOURCE_GROUP: ${{ secrets.AZURE_ACR_RESOURCE_GROUP }}
          WEBAPP_NAME: ttblabelverifyer
          ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}
          IMAGE_NAME: ttblabelverifyer
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ACR_RG="${ACR_RESOURCE_GROUP:-$RESOURCE_GROUP}"
          ACR_LOGIN_SERVER=$(az acr show -n "$ACR_NAME" -g "$ACR_RG" --query loginServer -o tsv)
          az webapp identity assign \
            --name "$WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" >/dev/null

          az webapp config container set \
            --name "$WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --container-image-name "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG" \
            --container-registry-url "https://$ACR_LOGIN_SERVER"

          az webapp config set \
            --name "$WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --generic-configurations '{"acrUseManagedIdentityCreds": true}'

          az webapp config appsettings set \
            --name "$WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --settings WEBSITES_PORT=8000

      - name: Restart Web App
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          WEBAPP_NAME: ttblabelverifyer
        run: |
          az webapp restart --name "$WEBAPP_NAME" --resource-group "$RESOURCE_GROUP"
